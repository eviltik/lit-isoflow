<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lit-isoflow — demo</title>
    <style>
      :root {
        --accent: #0392ff;
        --accent-soft: #e3f2ff;
        --text: #1c2430;
        --text-muted: #67748a;
        --card-bg: #ffffff;
        --card-border: rgba(16, 34, 64, 0.08);
        --card-shadow:
          0 2px 6px rgba(16, 34, 64, 0.06), 0 12px 32px rgba(16, 34, 64, 0.1);
        --hover: #f0f4f9;
        --radius: 12px;
      }

      /* L'UI de la démo suit le même thème que le canvas. */
      :root[data-theme='dark'] {
        --accent: #4493f8;
        --accent-soft: #1f3a5f;
        --text: #e6edf3;
        --text-muted: #9198a1;
        --card-bg: #2d333b;
        --card-border: rgba(255, 255, 255, 0.1);
        --card-shadow: 0 2px 6px rgba(0, 0, 0, 0.3), 0 12px 32px rgba(0, 0, 0, 0.4);
        --hover: #3a424c;
      }

      :root[data-theme='dark'] .icon-popover .gallery-header input,
      :root[data-theme='dark'] .icon-popover .gallery-header select,
      :root[data-theme='dark'] .panel input,
      :root[data-theme='dark'] .panel textarea,
      :root[data-theme='dark'] .panel select {
        background: #22272e;
        border-color: rgba(255, 255, 255, 0.14);
        color: var(--text);
      }

      :root[data-theme='dark'] .segmented button.active,
      :root[data-theme='dark'] .mode-toggle .track::after {
        background: #4d5763;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        color: var(--text);
        font-size: 13px;
      }

      lit-isoflow {
        position: absolute;
        inset: 0;
      }

      /* ---------- floating cards ---------- */

      .card {
        position: absolute;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        box-shadow: var(--card-shadow);
        z-index: 10;
      }

      /* Also the way back to the demo index. */
      .brand {
        top: 16px;
        left: 16px;
        padding: 8px 14px;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.2px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: inherit;
        text-decoration: none;
      }

      .brand:hover {
        border-color: var(--accent);
      }

      .brand .dot {
        width: 10px;
        height: 10px;
        border-radius: 3px;
        background: linear-gradient(135deg, var(--accent), #7cc3ff);
        transform: rotate(45deg);
      }

      .brand .version {
        color: var(--text-muted);
        font-weight: 400;
      }

      /* ---------- toolbar ---------- */

      .toolbar {
        top: 60px;
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 6px;
      }

      .toolbar hr {
        border: none;
        border-top: 1px solid var(--card-border);
        margin: 4px 6px;
      }

      button.icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 9px;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        position: relative;
      }

      button.icon-btn:hover {
        background: var(--hover);
      }

      button.icon-btn.active {
        background: var(--accent);
        color: #ffffff;
      }

      button.icon-btn:disabled {
        opacity: 0.35;
        cursor: default;
        background: transparent;
      }

      button.icon-btn svg {
        width: 19px;
        height: 19px;
        stroke: currentColor;
        stroke-width: 1.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* tooltip */
      button.icon-btn::after {
        content: attr(data-tip);
        position: absolute;
        left: calc(100% + 10px);
        top: 50%;
        transform: translateY(-50%);
        background: #222b38;
        color: #fff;
        padding: 5px 9px;
        border-radius: 6px;
        font-size: 11.5px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.12s;
      }

      button.icon-btn:hover::after {
        opacity: 1;
      }

      /* ---------- icon gallery popover ---------- */

      .icon-popover {
        position: absolute;
        top: 60px;
        left: 72px;
        width: 396px;
        display: none;
        flex-direction: column;
        z-index: 20;
        overflow: hidden;
      }

      .icon-popover.open {
        display: flex;
      }

      .icon-popover .gallery-header {
        display: flex;
        gap: 6px;
        padding: 10px;
        border-bottom: 1px solid var(--card-border);
      }

      .icon-popover .gallery-header input {
        flex: 1;
        font: inherit;
        border: 1px solid rgba(16, 34, 64, 0.14);
        border-radius: 8px;
        padding: 6px 9px;
        outline: none;
      }

      .icon-popover .gallery-header input:focus {
        border-color: var(--accent);
      }

      .icon-popover .gallery-header select {
        font: inherit;
        border: 1px solid rgba(16, 34, 64, 0.14);
        border-radius: 8px;
        padding: 6px;
        background: #fff;
        outline: none;
      }

      .icon-popover .gallery-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 10px;
        max-height: 380px;
        overflow-y: auto;
      }

      .icon-popover .gallery-grid button {
        border: 1px solid transparent;
        border-radius: 9px;
        background: transparent;
        cursor: pointer;
        padding: 8px 4px 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        font-size: 10.5px;
        color: var(--text-muted);
        font-family: inherit;
        min-width: 0;
      }

      .icon-popover .gallery-grid button span {
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .icon-popover .gallery-grid button:hover {
        background: var(--hover);
      }

      .icon-popover .gallery-grid button.selected {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: var(--text);
      }

      .icon-popover .gallery-grid img {
        width: 56px;
        height: 60px;
        object-fit: contain;
      }

      .icon-popover .gallery-more {
        padding: 0 12px 10px;
        color: var(--text-muted);
        font-size: 11px;
      }

      /* ---------- top-right: mode switch + export ---------- */

      .top-right {
        top: 16px;
        right: 16px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px;
      }

      /* mode switch: a real toggle, viewer ⟷ editor */
      .mode-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 6px;
        cursor: pointer;
        user-select: none;
        color: var(--text-muted);
        font-weight: 600;
      }

      .mode-toggle input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .mode-toggle .track {
        position: relative;
        width: 38px;
        height: 22px;
        border-radius: 999px;
        background: var(--hover);
        transition: background 0.15s;
        flex: none;
      }

      .mode-toggle .track::after {
        content: '';
        position: absolute;
        top: 3px;
        left: 3px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 1px 3px rgba(16, 34, 64, 0.3);
        transition: transform 0.15s;
      }

      .mode-toggle input:checked + .track {
        background: var(--accent);
      }

      .mode-toggle input:checked + .track::after {
        transform: translateX(16px);
      }

      .mode-toggle input:focus-visible + .track {
        box-shadow: 0 0 0 3px rgba(3, 146, 255, 0.25);
      }

      .mode-toggle input:checked ~ .mode-label {
        color: var(--text);
      }

      .mode-toggle .mode-label svg {
        width: 15px;
        height: 15px;
        stroke: currentColor;
        stroke-width: 1.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        vertical-align: -2px;
        margin-right: 5px;
      }

      /* export: one button, one dropdown */
      .export-menu {
        position: relative;
      }

      .export-menu .menu {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        min-width: 176px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        box-shadow: var(--card-shadow);
        padding: 6px;
        display: none;
        z-index: 30;
      }

      .export-menu.open .menu {
        display: block;
      }

      .export-menu .menu button {
        display: flex;
        align-items: center;
        gap: 9px;
        width: 100%;
        border: none;
        background: transparent;
        border-radius: 8px;
        padding: 8px 10px;
        font: inherit;
        color: var(--text);
        cursor: pointer;
        text-align: left;
      }

      .export-menu .menu button:hover {
        background: var(--hover);
      }

      .export-menu .menu button svg {
        width: 17px;
        height: 17px;
        stroke: currentColor;
        stroke-width: 1.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex: none;
      }

      .lang-switch {
        font: inherit;
        font-weight: 600;
        color: var(--text-muted);
        background: transparent;
        border: none;
        border-radius: 7px;
        padding: 6px 4px;
        cursor: pointer;
        outline: none;
      }

      .lang-switch:hover {
        background: var(--hover);
      }

      /* ---------- zoom controls ---------- */

      .zoom-card {
        bottom: 16px;
        left: 16px;
        display: flex;
        align-items: center;
        padding: 4px;
        gap: 2px;
      }

      .zoom-card .zoom-value {
        min-width: 46px;
        text-align: center;
        font-variant-numeric: tabular-nums;
        color: var(--text-muted);
        font-weight: 600;
      }

      /* ---------- shortcut hints ---------- */

      .hints {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(34, 43, 56, 0.85);
        color: #dbe4f0;
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 11.5px;
        z-index: 10;
        pointer-events: none;
      }

      .hints b {
        color: #ffffff;
        font-weight: 600;
      }

      /* ---------- property panel ---------- */

      .panel {
        top: 60px;
        right: 16px;
        width: 264px;
        padding: 16px;
        max-height: calc(100vh - 140px);
        overflow-y: auto;
      }

      .panel[hidden] {
        display: none;
      }

      .panel .panel-type {
        display: inline-block;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.6px;
        padding: 3px 8px;
        border-radius: 999px;
        margin-bottom: 4px;
      }

      .panel .panel-id {
        color: var(--text-muted);
        font-size: 11px;
        margin-bottom: 10px;
        font-family: ui-monospace, monospace;
      }

      .panel label {
        display: block;
        margin: 12px 0 5px;
        font-weight: 600;
        font-size: 12px;
      }

      .panel input,
      .panel textarea,
      .panel select {
        width: 100%;
        font: inherit;
        color: var(--text);
        background: #fbfcfe;
        border: 1px solid rgba(16, 34, 64, 0.14);
        border-radius: 8px;
        padding: 7px 9px;
        outline: none;
      }

      .panel input:focus,
      .panel textarea:focus,
      .panel select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(3, 146, 255, 0.15);
      }

      .panel textarea {
        min-height: 88px;
        resize: vertical;
      }

      .panel .swatches {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .panel .swatch {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        border: 2px solid transparent;
        cursor: pointer;
        padding: 0;
      }

      .panel .swatch.selected {
        border-color: var(--text);
      }

      .panel .icon-field {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        font: inherit;
        color: var(--text);
        background: #fbfcfe;
        border: 1px solid rgba(16, 34, 64, 0.14);
        border-radius: 8px;
        padding: 6px 9px;
        cursor: pointer;
      }

      .panel .icon-field:hover {
        border-color: var(--accent);
      }

      .panel .icon-field img {
        width: 24px;
        height: 26px;
        object-fit: contain;
      }

      .panel .delete-row {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
      }

      .panel .delete-row button {
        border: none;
        background: #fdecec;
        color: #c0392b;
        font: inherit;
        font-weight: 600;
        padding: 7px 12px;
        border-radius: 8px;
        cursor: pointer;
      }

      .panel .delete-row button:hover {
        background: #f9d9d7;
      }

      body[data-mode='viewer'] .toolbar,
      body[data-mode='viewer'] .panel,
      body[data-mode='viewer'] .hints,
      body[data-mode='viewer'] .icon-popover {
        display: none;
      }
    </style>
    <script type="module" crossorigin src="../assets/editor-C-3JlQIP.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/model-CxA0sXBG.js">
  </head>
  <body data-mode="editor">
    <lit-isoflow editor-mode="EDITABLE" fit-to-view></lit-isoflow>

    <a class="card brand" href="../" title="All demos">
      <span class="dot"></span> lit-isoflow <span class="version">editor</span>
    </a>

    <div class="card top-right">
      <select id="lang-switch" class="lang-switch"></select>

      <label class="mode-toggle" id="mode-toggle">
        <input type="checkbox" id="mode-input" checked />
        <span class="track"></span>
        <span class="mode-label" id="mode-label"></span>
      </label>

      <button class="icon-btn" id="theme-toggle"></button>

      <div class="export-menu" id="export-menu">
        <button class="icon-btn" id="export-toggle"></button>
        <div class="menu">
          <button id="export-svg"></button>
          <button id="export-png"></button>
          <button id="export-json"></button>
        </div>
      </div>
    </div>

    <div class="card toolbar" id="toolbar"></div>
    <div class="card icon-popover" id="icon-popover"></div>

    <div class="card zoom-card">
      <button class="icon-btn" id="zoom-out"></button>
      <span class="zoom-value" id="zoom-label">100%</span>
      <button class="icon-btn" id="zoom-in"></button>
      <button class="icon-btn" id="fit"></button>
    </div>

    <div class="hints" id="hints"></div>

    <div class="card panel" id="panel" hidden>
      <span class="panel-type" id="panel-type"></span>
      <div class="panel-id" id="panel-id"></div>
      <div id="panel-fields"></div>
      <div class="delete-row">
        <button id="panel-delete"></button>
      </div>
    </div>

  </body>
</html>
